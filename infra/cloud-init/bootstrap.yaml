#cloud-config
# Bootstrap script for the Oracle A1 ARM instance (Ubuntu 24.04 aarch64).
# Injected via instance metadata user_data (base64-encoded by Terraform).
# Runs once on first boot. Subsequent boots do NOT re-run cloud-init.
#
# What this does:
#   1. Creates a non-root 'deploy' user (Docker-capable, key-only SSH).
#   2. Installs Docker Engine + Compose plugin from Docker's official apt repo.
#   3. Installs cloudflared from Cloudflare's apt repo.
#   4. Creates a 4 GB swap file (A1 free tier has no swap by default).
#   5. Places the app files under /opt/photo and configures cron jobs:
#      - Nightly pg_dump backup to R2 at 02:00 UTC.
#      - Keepalive write every 30 min (prevents Oracle idle reclamation).
#   6. Writes a Docker daemon config that caps log file size.
#
# After first boot (allow ~5 min for cloud-init to finish):
#   ssh ubuntu@<public-ip>
#   tail -f /var/log/cloud-init-output.log   # watch progress
#   sudo -u deploy bash                       # switch to deploy user
#   cd /opt/photo && cp .env.example .env && nano .env
#   docker compose --profile prod up -d

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - gnupg
  - ca-certificates
  - lsb-release
  - awscli        # used by backup.sh to upload pg_dump to R2
  - htop
  - jq

users:
  - name: deploy
    gecos: "Photo Platform Deploy"
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": { "max-size": "50m", "max-file": "3" }
      }

  - path: /opt/photo/scripts/backup.sh
    permissions: "0750"
    content: |
      #!/usr/bin/env bash
      # Nightly pg_dump → gzip → upload to Cloudflare R2.
      # Runs as deploy user via cron. Logs to /var/log/photo-backup.log.
      set -euo pipefail
      set -a; source /opt/photo/.env; set +a

      TIMESTAMP=$$(date -u +%Y%m%dT%H%M%SZ)
      BACKUP_FILE="/tmp/photo-db-$${TIMESTAMP}.sql.gz"
      R2_KEY="backups/pg_dump-$${TIMESTAMP}.sql.gz"

      echo "[$$(date -u)] Starting backup → $${R2_KEY}"

      docker compose -f /opt/photo/docker-compose.yml exec -T postgres \
        pg_dump -U photo -d photo | gzip > "$${BACKUP_FILE}"

      AWS_ACCESS_KEY_ID="$${R2_ACCESS_KEY_ID}" \
      AWS_SECRET_ACCESS_KEY="$${R2_SECRET_ACCESS_KEY}" \
      aws s3 cp "$${BACKUP_FILE}" \
        "s3://$${R2_BUCKET}/$${R2_KEY}" \
        --endpoint-url "$${R2_ENDPOINT_URL}" \
        --region auto \
        --no-progress

      rm -f "$${BACKUP_FILE}"
      echo "[$$(date -u)] Backup complete → $${R2_KEY}"

  - path: /opt/photo/scripts/expire.sh
    permissions: "0750"
    content: |
      #!/usr/bin/env bash
      # Nightly gallery expiry: calls the API to purge galleries past their expires_at.
      # Runs as deploy user via cron. Logs to /var/log/photo-expire.log.
      set -euo pipefail
      set -a; source /opt/photo/.env; set +a

      echo "[$$(date -u)] Triggering gallery expiry"
      curl -sf -X POST \
        -H "Authorization: Bearer $${ADMIN_TOKEN}" \
        http://localhost:8000/admin/expire-galleries
      echo "[$$(date -u)] Expiry complete"

  - path: /opt/photo/scripts/keepalive.sh
    permissions: "0750"
    content: |
      #!/usr/bin/env bash
      # Oracle Cloud reclaims Always Free instances idle for >7 days.
      # Writing a small file every 30 min counts as disk activity.
      # Resource cost: negligible.
      echo "$$(date -u) keepalive" > /var/run/photo-keepalive

runcmd:
  # ---- swap (4 GB) ----
  - fallocate -l 4G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab
  - sysctl vm.swappiness=10
  - echo 'vm.swappiness=10' >> /etc/sysctl.conf

  # ---- Docker Engine ----
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $$(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker

  # ---- cloudflared ----
  - curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
      -o /usr/share/keyrings/cloudflare-main.gpg
  - |
    echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
    https://pkg.cloudflare.com/cloudflared $$(lsb_release -cs) main" \
    > /etc/apt/sources.list.d/cloudflared.list
  - apt-get update -y
  - apt-get install -y cloudflared

  # ---- SSH hardening ----
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # ---- app directory ----
  - mkdir -p /opt/photo/scripts
  - chown -R deploy:deploy /opt/photo
  - chmod 750 /opt/photo/scripts/backup.sh /opt/photo/scripts/expire.sh /opt/photo/scripts/keepalive.sh

  # ---- cron (as deploy user) ----
  - |
    (crontab -u deploy -l 2>/dev/null; echo "0 2 * * * /opt/photo/scripts/backup.sh >> /var/log/photo-backup.log 2>&1") \
    | crontab -u deploy -
  - |
    (crontab -u deploy -l 2>/dev/null; echo "*/30 * * * * /opt/photo/scripts/keepalive.sh") \
    | crontab -u deploy -
  - |
    (crontab -u deploy -l 2>/dev/null; echo "15 3 * * * /opt/photo/scripts/expire.sh >> /var/log/photo-expire.log 2>&1") \
    | crontab -u deploy -

  # ---- GHCR login for Watchtower ----
  # Watchtower needs GHCR credentials to pull updated images.
  # Run this manually after boot (requires your GHCR token):
  #   docker login ghcr.io -u <github-username> --password-stdin <<< <token>
  # The credentials are stored in /root/.docker/config.json and mounted into Watchtower.

  - echo "cloud-init bootstrap complete"

final_message: |
  Photo Platform bootstrap complete.
  Next steps:
    1. SSH: ssh ubuntu@$$(curl -s ifconfig.me)
    2. Copy your .env:  scp .env ubuntu@<ip>:/opt/photo/.env
    3. Copy compose:    scp docker-compose.yml ubuntu@<ip>:/opt/photo/
    4. Log in to GHCR: docker login ghcr.io -u <user> --password-stdin <<< <token>
    5. Start:          cd /opt/photo && docker compose --profile prod up -d
    6. Configure Cloudflare Tunnel at https://one.dash.cloudflare.com, add TUNNEL_TOKEN to .env
