name: Build and push arm64 image

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the x86 runner emulate arm64 for the build step.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Buildx is the multi-platform builder. Cache via GitHub Actions cache API.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for linux/arm64 (Oracle A1 is aarch64).
      # Tags: :latest and :<git-sha> for rollback.
      # Cache: layer cache stored in GitHub Actions cache (free, up to 10 GB).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance attestation so GHCR shows build metadata.
          provenance: true
